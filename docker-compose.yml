services:

  waha:
    image: devlikeapro/waha-plus:latest
    container_name: waha-api
    platform: linux/amd64

    ports:
      - "3002:3000"

    environment:
      WAHA_LOG_LEVEL: info
      WHATSAPP_DEFAULT_ENGINE: NOWEB

      WAHA_API_KEY: bddfb14b40fd43e1a17c709aac4bbd78

      WAHA_DASHBOARD_USERNAME: admin
      WAHA_DASHBOARD_PASSWORD: ZtozqHAxAV1pgGGCzhxQOYZ0o

      WHATSAPP_SWAGGER_ENABLED: true
      WHATSAPP_SWAGGER_USERNAME: admin
      WHATSAPP_SWAGGER_PASSWORD: admin123

      REDIS_URL: redis://:wahaRedisStrongPass@redis:6379

      WAHA_AUTO_START_SESSIONS: true
      WAHA_RESTART_ALL_SESSIONS: true

    volumes:
      - ./docker-data/waha-sessions:/app/.sessions

    depends_on:
      redis:
        condition: service_healthy

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/version"]
      interval: 30s
      timeout: 10s
      retries: 5

    networks:
      - waha-network


  redis:
    image: redis:7-alpine
    container_name: waha-redis

    command: redis-server --requirepass wahaRedisStrongPass --appendonly yes

    volumes:
      - redis-data:/data

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "redis-cli","-a","wahaRedisStrongPass","ping"]
      interval: 10s
      timeout: 5s
      retries: 5

    networks:
      - waha-network


volumes:
  redis-data:

networks:
  waha-network:
    driver: bridge